<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Necromancer">
  <defs>
    <radialGradient id="nBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#3a1a4a"/>
      <stop offset="55%" stop-color="#150820"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="nBone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#efe4d0"/>
      <stop offset="60%" stop-color="#c9b98c"/>
      <stop offset="100%" stop-color="#6b5a3a"/>
    </linearGradient>
    <radialGradient id="nEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e884ff"/>
      <stop offset="60%" stop-color="#8f2fbf"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="nGlow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#nBg)"/>

  <!-- Aura -->
  <circle cx="200" cy="180" r="130" fill="#b968d4" opacity="0.08" filter="url(#nGlow)"/>
  <circle cx="200" cy="180" r="90"  fill="#b968d4" opacity="0.12" filter="url(#nGlow)"/>

  <!-- Crossed femur bones (behind skull) -->
  <g stroke="url(#nBone)" stroke-width="14" stroke-linecap="round" opacity="0.75">
    <line x1="90"  y1="90"  x2="310" y2="310"/>
    <line x1="310" y1="90"  x2="90"  y2="310"/>
  </g>
  <!-- Bone knobs -->
  <g fill="url(#nBone)">
    <circle cx="90"  cy="90"  r="14"/>
    <circle cx="80"  cy="80"  r="10"/>
    <circle cx="310" cy="90"  r="14"/>
    <circle cx="320" cy="80"  r="10"/>
    <circle cx="90"  cy="310" r="14"/>
    <circle cx="80"  cy="320" r="10"/>
    <circle cx="310" cy="310" r="14"/>
    <circle cx="320" cy="320" r="10"/>
  </g>

  <!-- Skull -->
  <g>
    <!-- Cranium -->
    <path d="M 200 80
             C 130 80, 105 140, 110 195
             C 112 225, 125 245, 140 258
             L 140 290
             L 165 290 L 168 275 L 178 290
             L 200 290
             L 222 290 L 232 275 L 235 290
             L 260 290
             L 260 258
             C 275 245, 288 225, 290 195
             C 295 140, 270 80, 200 80 Z"
          fill="url(#nBone)" stroke="#4a3a20" stroke-width="2"/>

    <!-- Cheek shadows -->
    <path d="M 130 200 Q 165 250 185 260" fill="none" stroke="#6b5a3a" stroke-width="2" opacity="0.6"/>
    <path d="M 270 200 Q 235 250 215 260" fill="none" stroke="#6b5a3a" stroke-width="2" opacity="0.6"/>

    <!-- Eye sockets (glowing) -->
    <ellipse cx="165" cy="175" rx="24" ry="28" fill="#000"/>
    <ellipse cx="235" cy="175" rx="24" ry="28" fill="#000"/>
    <circle cx="165" cy="175" r="16" fill="url(#nEye)" filter="url(#nGlow)"/>
    <circle cx="235" cy="175" r="16" fill="url(#nEye)" filter="url(#nGlow)"/>
    <circle cx="165" cy="175" r="10" fill="url(#nEye)"/>
    <circle cx="235" cy="175" r="10" fill="url(#nEye)"/>

    <!-- Nasal cavity -->
    <polygon points="200,205 190,235 200,250 210,235" fill="#000"/>

    <!-- Teeth (upper) -->
    <g fill="#efe4d0" stroke="#4a3a20" stroke-width="0.5">
      <rect x="158" y="260" width="10" height="20" rx="2"/>
      <rect x="170" y="260" width="10" height="22" rx="2"/>
      <rect x="182" y="260" width="10" height="22" rx="2"/>
      <rect x="194" y="260" width="10" height="24" rx="2"/>
      <rect x="206" y="260" width="10" height="22" rx="2"/>
      <rect x="218" y="260" width="10" height="22" rx="2"/>
      <rect x="230" y="260" width="10" height="20" rx="2"/>
    </g>

    <!-- Highlight -->
    <path d="M 150 110 Q 140 140 145 175" stroke="#efe4d0" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Spinal column below -->
  <g fill="url(#nBone)" opacity="0.85">
    <ellipse cx="200" cy="310" rx="22" ry="9"/>
    <ellipse cx="200" cy="328" rx="20" ry="8"/>
    <ellipse cx="200" cy="344" rx="18" ry="7"/>
  </g>

  <!-- Corner ornaments -->
  <g fill="#b968d4" opacity="0.6">
    <path d="M 20 20 L 55 20 L 55 25 L 25 25 L 25 55 L 20 55 Z"/>
    <path d="M 380 20 L 345 20 L 345 25 L 375 25 L 375 55 L 380 55 Z"/>
    <path d="M 20 380 L 55 380 L 55 375 L 25 375 L 25 345 L 20 345 Z"/>
    <path d="M 380 380 L 345 380 L 345 375 L 375 375 L 375 345 L 380 345 Z"/>
  </g>

  <text x="200" y="380" font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#e884ff" text-anchor="middle" letter-spacing="4" opacity="0.85">NECROMANCER</text>
</svg>
