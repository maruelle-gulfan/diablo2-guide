<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Druid">
  <defs>
    <radialGradient id="dBg" cx="50%" cy="45%" r="70%">
      <stop offset="0%"  stop-color="#1a3a1e"/>
      <stop offset="55%" stop-color="#08160a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="dBark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#8b5a2b"/>
      <stop offset="50%" stop-color="#4a3018"/>
      <stop offset="100%" stop-color="#2a1a08"/>
    </linearGradient>
    <radialGradient id="dLeaf" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#9adc7a"/>
      <stop offset="60%" stop-color="#4a8a3a"/>
      <stop offset="100%" stop-color="#1a3a10"/>
    </radialGradient>
    <linearGradient id="dWind" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#c0e8b0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c0e8b0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c0e8b0" stop-opacity="0"/>
    </linearGradient>
    <filter id="dGlow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#dBg)"/>

  <!-- Hurricane / Tornado spiral above tree -->
  <g fill="none" stroke="#a0d090" stroke-width="1.5" opacity="0.5">
    <path d="M 130 80 Q 200 60 270 80 Q 250 90 200 90 Q 150 90 130 80 Z"/>
    <path d="M 140 100 Q 200 85 260 100 Q 240 110 200 110 Q 160 110 140 100 Z"/>
    <path d="M 150 120 Q 200 108 250 120 Q 230 130 200 130 Q 170 130 150 120 Z"/>
  </g>
  <!-- Wind streaks -->
  <g stroke="url(#dWind)" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 60 130 Q 130 120 200 130"/>
    <path d="M 200 130 Q 270 120 340 130"/>
    <path d="M 80 155 Q 150 145 220 155"/>
    <path d="M 180 155 Q 250 145 320 155"/>
  </g>

  <!-- Tree Trunk -->
  <path d="M 190 235 L 210 235 L 215 340 L 230 355 L 170 355 L 185 340 Z"
        fill="url(#dBark)" stroke="#1a0f04" stroke-width="1.5"/>

  <!-- Tree Bark texture lines -->
  <g stroke="#2a1808" stroke-width="1" opacity="0.6" fill="none">
    <path d="M 195 245 L 198 340"/>
    <path d="M 205 250 L 202 340"/>
    <path d="M 190 260 Q 195 280 190 300"/>
    <path d="M 210 265 Q 205 285 210 305"/>
  </g>

  <!-- Roots -->
  <g fill="url(#dBark)" stroke="#1a0f04" stroke-width="1.5">
    <path d="M 170 355 Q 130 358 100 365 Q 130 350 170 350 Z"/>
    <path d="M 230 355 Q 270 358 300 365 Q 270 350 230 350 Z"/>
    <path d="M 175 355 Q 155 375 130 385 Q 155 365 180 355 Z"/>
    <path d="M 225 355 Q 245 375 270 385 Q 245 365 220 355 Z"/>
  </g>

  <!-- Tree Canopy (large foliage clusters) -->
  <g stroke="#1a3a10" stroke-width="1.5">
    <ellipse cx="200" cy="180" rx="105" ry="70" fill="url(#dLeaf)"/>
    <ellipse cx="145" cy="175" rx="45"  ry="42" fill="url(#dLeaf)"/>
    <ellipse cx="255" cy="175" rx="45"  ry="42" fill="url(#dLeaf)"/>
    <ellipse cx="200" cy="130" rx="55"  ry="35" fill="url(#dLeaf)"/>
    <ellipse cx="165" cy="220" rx="42"  ry="30" fill="url(#dLeaf)"/>
    <ellipse cx="235" cy="220" rx="42"  ry="30" fill="url(#dLeaf)"/>
  </g>

  <!-- Highlight on leaves -->
  <g fill="#9adc7a" opacity="0.5" filter="url(#dGlow)">
    <ellipse cx="180" cy="150" rx="18" ry="10"/>
    <ellipse cx="230" cy="160" rx="15" ry="8"/>
    <ellipse cx="150" cy="185" rx="12" ry="6"/>
  </g>

  <!-- Small wolf head at base (companion) -->
  <g transform="translate(200, 320)">
    <!-- Wolf silhouette -->
    <path d="M -20 -5 L -15 -18 L -8 -14 L -3 -20 L 3 -20 L 8 -14 L 15 -18 L 20 -5 L 18 5 L 12 8 L 6 6 L 3 12 L -3 12 L -6 6 L -12 8 L -18 5 Z"
          fill="#2a1a10" stroke="#6cbb5f" stroke-width="1" opacity="0.85"/>
    <!-- Wolf eyes -->
    <circle cx="-6" cy="-6" r="1.8" fill="#9adc7a" filter="url(#dGlow)"/>
    <circle cx="6"  cy="-6" r="1.8" fill="#9adc7a" filter="url(#dGlow)"/>
  </g>

  <!-- Ravens (small silhouettes flying) -->
  <g fill="#000" opacity="0.7">
    <path d="M 70 90 q 5 -3 10 0 q 5 -3 10 0 q -5 2 -10 2 q -5 0 -10 -2 Z"/>
    <path d="M 320 100 q 5 -3 10 0 q 5 -3 10 0 q -5 2 -10 2 q -5 0 -10 -2 Z"/>
    <path d="M 340 60 q 4 -2 8 0 q 4 -2 8 0 q -4 2 -8 2 q -4 0 -8 -2 Z"/>
  </g>

  <!-- Corner ornaments -->
  <g fill="#6cbb5f" opacity="0.6">
    <path d="M 20 20 L 55 20 L 55 25 L 25 25 L 25 55 L 20 55 Z"/>
    <path d="M 380 20 L 345 20 L 345 25 L 375 25 L 375 55 L 380 55 Z"/>
    <path d="M 20 380 L 55 380 L 55 375 L 25 375 L 25 345 L 20 345 Z"/>
    <path d="M 380 380 L 345 380 L 345 375 L 375 375 L 375 345 L 380 345 Z"/>
  </g>

  <text x="200" y="390" font-family="Georgia, serif" font-size="19" font-weight="bold"
        fill="#9adc7a" text-anchor="middle" letter-spacing="5" opacity="0.9">DRUID</text>
</svg>
